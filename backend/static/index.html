<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wall Street AI</title>
    <meta name="theme-color" content="#0f172a">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" href="/static/site-icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <!-- 引入 Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css?v=20260607-latest-report-versions">
</head>
<body>
    <!-- 背景特效 -->
    <div class="bg-glow bg-glow-left"></div>
    <div class="bg-glow bg-glow-right"></div>

    <!-- 首頁區域 -->
    <main id="home-view" class="view-container active">
        <div class="glass-panel text-center">
            <h1 class="gradient-text title">Wall Street AI</h1>
            <p class="subtitle">連續式股票分析 Agent</p>
            
            <div class="input-group">
                <label for="ticker-input">輸入股票代號</label>
                <input type="text" id="ticker-input" placeholder="例如: 2449.TW 或 AAPL" autocomplete="off" spellcheck="false" />
            </div>

            <div class="pipeline-selector" role="radiogroup" aria-label="選擇分析模式">
                <label class="pipeline-option">
                    <input type="radio" name="pipeline-mode" value="v1" checked />
                    <span>
                        <strong>模式 A</strong>
                        <small>學術深度派 · 7 Agent</small>
                    </span>
                </label>
                <label class="pipeline-option">
                    <input type="radio" name="pipeline-mode" value="v2" />
                    <span>
                        <strong>模式 B</strong>
                        <small>實戰交易派 · 6 Agent</small>
                    </span>
                </label>
                <label class="pipeline-option">
                    <input type="radio" name="pipeline-mode" value="both" />
                    <span>
                        <strong>連續 A+B</strong>
                        <small>先學術再實戰 · 13 Agent</small>
                    </span>
                </label>
            </div>

            <button id="analyze-btn" class="glow-button">
                <span>開始深度分析</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path></svg>
            </button>
            
            <!-- 歷史報告區域 -->
            <div class="history-section">
                <div class="history-title">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M18.7 8l-5.1 5.2-2.8-2.7L7 14.3"/></svg>
                    歷史報告
                </div>
                <section id="provider-sla-panel" class="provider-sla-panel" aria-live="polite">
                    <div class="provider-sla-header">
                        <div>
                            <span class="provider-sla-kicker">全系統資料來源狀態</span>
                            <strong id="provider-sla-summary">載入中</strong>
                        </div>
                        <div class="provider-sla-actions">
                            <select id="provider-sla-window" class="provider-sla-window" aria-label="全系統資料來源狀態時間範圍">
                                <option value="all">全部</option>
                                <option value="last_1h">1 小時</option>
                                <option value="last_24h" selected>24 小時</option>
                                <option value="last_7d">7 天</option>
                            </select>
                            <button id="provider-sla-refresh" class="icon-button" type="button" aria-label="刷新全系統資料來源狀態">
                                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M16 8h5V3"/></svg>
                            </button>
                        </div>
                    </div>
                    <div id="provider-sla-list" class="provider-sla-list"></div>
                </section>
                <section id="active-jobs-panel" class="provider-sla-panel" aria-live="polite">
                    <div class="provider-sla-header">
                        <div>
                            <span class="provider-sla-kicker">分析任務狀態</span>
                            <strong id="active-jobs-summary">載入中</strong>
                        </div>
                        <button id="active-jobs-refresh" class="icon-button" type="button" aria-label="刷新分析任務狀態">
                            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M16 8h5V3"/></svg>
                        </button>
                    </div>
                    <div id="active-jobs-list" class="provider-sla-list"></div>
                </section>
                <div class="history-workspace">
                    <div class="history-list-pane">
                        <div class="history-controls">
                            <input type="search" id="history-search" class="history-search" placeholder="搜尋代號或公司" autocomplete="off" spellcheck="false" />
                            <div class="history-filter-row">
                                <label class="history-filter-field">
                                    <span>報告類型</span>
                                    <select id="history-pipeline-filter" class="history-filter-select">
                                        <option value="all">全部類型</option>
                                        <option value="v1">模式 A · 學術深度派</option>
                                        <option value="v2">模式 B · 實戰交易派</option>
                                    </select>
                                </label>
                                <label class="history-filter-field">
                                    <span>投資建議</span>
                                    <select id="history-recommendation-filter" class="history-filter-select">
                                        <option value="all">全部建議</option>
                                        <option value="買入">買入</option>
                                        <option value="持有">持有</option>
                                        <option value="避免">避免</option>
                                    </select>
                                </label>
                                <label class="history-filter-field">
                                    <span>本報告資料狀態</span>
                                    <select id="history-data-trust-filter" class="history-filter-select">
                                        <option value="all">全部狀態</option>
                                        <option value="fresh">資料新鮮</option>
                                        <option value="partial">部分異常</option>
                                        <option value="stale">部分過期</option>
                                        <option value="error">來源異常</option>
                                        <option value="unknown">未記錄</option>
                                    </select>
                                </label>
                                <label class="history-version-toggle">
                                    <span>顯示舊版報告</span>
                                    <input type="checkbox" id="history-include-versions" aria-label="顯示舊版報告" />
                                </label>
                            </div>
                        </div>
                        <div id="history-list" class="history-list">
                            <!-- 動態載入 -->
                        </div>
                        <div class="history-pagination" id="history-pagination" hidden>
                            <button id="history-prev" class="pager-btn" type="button" aria-label="上一頁">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                            </button>
                            <span id="history-page-info" class="history-page-info"></span>
                            <button id="history-next" class="pager-btn" type="button" aria-label="下一頁">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                            </button>
                        </div>
                    </div>
                    <section id="report-preview" class="report-preview" hidden aria-live="polite">
                        <div class="preview-header">
                            <div>
                                <div id="preview-mode" class="preview-mode"></div>
                                <h2 id="preview-title" class="preview-title">投資建議</h2>
                            </div>
                            <button id="preview-close-btn" class="icon-button" type="button" aria-label="關閉投資建議預覽">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                            </button>
                        </div>
                        <div class="preview-decision-row">
                            <div class="preview-decision">
                                <span class="preview-label">當日股價</span>
                                <strong id="preview-price">N/A</strong>
                            </div>
                            <div class="preview-decision">
                                <span class="preview-label">建議</span>
                                <strong id="preview-recommendation">N/A</strong>
                            </div>
                            <div class="preview-decision">
                                <span class="preview-label">信心</span>
                                <strong id="preview-confidence">N/A</strong>
                            </div>
                        </div>
                        <div class="preview-targets">
                            <div>
                                <span>3個月</span>
                                <strong id="preview-target-3m">N/A</strong>
                            </div>
                            <div>
                                <span>6個月</span>
                                <strong id="preview-target-6m">N/A</strong>
                            </div>
                            <div>
                                <span>12個月</span>
                                <strong id="preview-target-12m">N/A</strong>
                            </div>
                        </div>
                        <p id="preview-summary" class="preview-summary"></p>
                        <p id="preview-stale-notice" class="preview-stale-notice" hidden></p>
                        <button id="preview-open-report-btn" class="preview-open-button" type="button">
                            <span>查看完整報告</span>
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7"/><path d="M7 7h10v10"/></svg>
                        </button>
                        <button id="preview-refresh-data-btn" class="preview-refresh-button" type="button">
                            <span>刷新資料快照</span>
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M16 8h5V3"/></svg>
                        </button>
                        <div class="preview-rerun-row">
                            <button id="preview-rerun-final-btn" class="preview-rerun-button" type="button">
                                <span>重跑最終建議</span>
                            </button>
                            <button id="preview-rerun-modeb-btn" class="preview-rerun-button" type="button">
                                <span>產生模式 B 報告</span>
                            </button>
                            <button id="preview-rerun-cancel-btn" class="preview-rerun-button preview-rerun-cancel-button" type="button" hidden>
                                <span>取消重跑</span>
                            </button>
                        </div>
                    </section>
                </div>
            </div>
        </div>
    </main>

    <!-- 載入中區域 -->
    <main id="loading-view" class="view-container">
        <div class="glass-panel text-center">
            <div class="pulse-ring"></div>
            <h2 class="gradient-text mt-6">分析進行中</h2>
            <p id="loading-status" class="status-text">連接系統...</p>
            <p id="loading-msg" class="msg-text">正在獲取市場資料</p>
            
            <div class="progress-bar-container">
                <div id="progress-bar" class="progress-bar-fill"></div>
            </div>
            
            <p id="loading-hint" class="hint-text">請稍候，AI 分析師正在為您撰寫研報...</p>
        </div>
    </main>

    <!-- 報告區域 -->
    <main id="report-view" class="view-container full-width">
        <div class="report-header glass-panel-flat">
            <button id="back-btn" class="text-button">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"></path></svg>
                返回
            </button>
            <h3 class="report-title" id="report-ticker-title">報告</h3>
            <div class="report-actions" style="margin-left: auto; display: flex; gap: 8px;">
                <button id="download-html-btn" class="secondary-button" style="padding: 6px 12px; font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #fff; border-radius: 6px; cursor: pointer;">
                    下載 HTML
                </button>
                <button id="download-md-btn" class="primary-button" style="padding: 6px 12px; font-size: 0.9rem; border: none; background: #3b82f6; color: #fff; border-radius: 6px; cursor: pointer;">
                    下載 Markdown
                </button>
                <button id="download-data-btn" class="secondary-button" style="padding: 6px 12px; font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #fff; border-radius: 6px; cursor: pointer;">
                    下載資料 JSON
                </button>
            </div>
        </div>
        <div id="report-audit-notice" class="report-audit-notice" hidden></div>
        <div class="iframe-wrapper">
            <iframe id="report-iframe" src="" frameborder="0"></iframe>
        </div>
    </main>

    <script src="/static/ui_helpers.js?v=20260607-system-report-trust"></script>
    <script src="/static/api_client.js?v=20260607-latest-report-versions"></script>
    <script src="/static/provider_sla_panel.js?v=20260607-system-report-trust"></script>
    <script src="/static/active_jobs_panel.js?v=20260607-active-jobs"></script>
    <script src="/static/report_rerun.js?v=20260607-rerun-stream"></script>
    <script src="/static/analysis_stream.js?v=20260607-analysis-stream"></script>
    <script src="/static/history_panel.js?v=20260607-history-panel"></script>
    <script src="/static/report_preview_panel.js?v=20260607-rerun-labels"></script>
    <script src="/static/view_controller.js?v=20260607-view-controller"></script>
    <script src="/static/history_filters.js?v=20260607-latest-report-versions"></script>
    <script src="/static/report_actions.js?v=20260607-report-actions"></script>
    <script src="/static/history_workspace.js?v=20260607-latest-report-versions"></script>
    <script src="/static/app.js?v=20260607-latest-report-versions"></script>
</body>
</html>
