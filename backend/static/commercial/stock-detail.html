<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OnStock 單股研究</title>
  <link rel="stylesheet" href="/static/commercial/styles/tokens.css?v=20260711-operator6">
  <link rel="stylesheet" href="/static/commercial/styles/shell.css?v=20260711-operator6">
  <link rel="stylesheet" href="/static/commercial/styles/components.css?v=20260711-operator6">
  <link rel="stylesheet" href="/static/commercial/styles/responsive.css?v=20260711-operator6">
</head>
<body data-commercial-page="stock">
  <header class="commercial-topbar">
    <a class="commercial-brand" href="/" aria-label="回到主頁">OnStock AI</a>
    <nav class="commercial-nav" aria-label="商業版投資工作區">
      <a href="/static/commercial/research-workbench.html">今日決策</a>
      <a href="/static/commercial/stock-detail.html" aria-current="page">單股研究</a>
      <a href="/static/commercial/portfolio-dashboard.html">組合健檢</a>
    </nav>
  </header>
  <main class="commercial-page">
    <header class="commercial-page-header">
      <span class="commercial-eyebrow">股票快照</span>
      <h1 id="stock-title" tabindex="-1">單股研究</h1>
      <p class="commercial-muted">先判斷是否值得占用一個部位，再決定最多投入多少。</p>
    </header>
    <section id="stock-policy-editor" data-operator-policy-editor aria-label="操作設定"></section>
    <section id="stock-policy" class="commercial-policy-strip" aria-label="操作護欄" data-derived-from="operator-policy"></section>
    <div class="commercial-workspace-grid">
      <form id="stock-form" class="commercial-panel">
        <div class="commercial-input-grid commercial-ticker-inputs">
          <label class="commercial-field" for="stock-ticker-select">
            <span>從清單選擇</span>
            <select id="stock-ticker-select">
              <option value="">正在載入股票清單…</option>
            </select>
          </label>
          <label class="commercial-field" for="stock-ticker">
            <span>或輸入股票代號</span>
            <input id="stock-ticker" name="ticker" autocomplete="off" required>
          </label>
        </div>
        <button id="stock-load" class="commercial-primary-action" type="submit">更新股票快照</button>
      </form>
      <section class="commercial-answer" aria-labelledby="stock-answer-title">
        <span id="stock-company" class="commercial-eyebrow"></span>
        <h2 id="stock-answer-title">輸入股票代號以載入快照</h2>
        <p id="stock-answer-detail" class="commercial-muted"></p>
        <div id="stock-metrics" class="commercial-metrics"></div>
      </section>
    </div>
    <form id="stock-position-form" class="commercial-panel commercial-position-planner" novalidate data-derived-from="operator-policy">
      <div class="commercial-section-heading">
        <div>
          <span class="commercial-eyebrow">目前操作規則試算</span>
          <h2>部位與最大損失</h2>
        </div>
        <p class="commercial-muted">預設停損使用 6M 均線；無資料時使用現價下方 8%。</p>
      </div>
      <div class="commercial-input-grid">
        <label class="commercial-field" for="stock-entry-price">
          <span>預計進場價</span>
          <input id="stock-entry-price" type="number" min="0.01" step="0.01" inputmode="decimal">
        </label>
        <label class="commercial-field" for="stock-stop-price">
          <span>停損參考價</span>
          <input id="stock-stop-price" type="number" min="0" step="0.01" inputmode="decimal">
        </label>
      </div>
      <p id="stock-position-error" role="alert"></p>
      <div id="stock-position-metrics" class="commercial-metrics commercial-position-metrics" aria-live="polite"></div>
    </form>
    <div id="stock-tabs" class="commercial-tabs" role="tablist" aria-label="股票研究證據">
      <button type="button" role="tab" aria-selected="true" data-tab="plan">操作計畫</button>
      <button type="button" role="tab" aria-selected="false" tabindex="-1" data-tab="valuation">估值</button>
      <button type="button" role="tab" aria-selected="false" tabindex="-1" data-tab="fundamentals">基本面</button>
      <button type="button" role="tab" aria-selected="false" tabindex="-1" data-tab="events">事件</button>
      <button type="button" role="tab" aria-selected="false" tabindex="-1" data-tab="technical">技術</button>
    </div>
    <section id="stock-evidence" class="commercial-panel" aria-live="polite"></section>
    <section id="stock-source-status" class="commercial-source-status" aria-live="polite"></section>
  </main>
  <script type="module" src="/static/commercial/pages/stock_page.js?v=20260711-operator6"></script>
</body>
</html>
