<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OnStock 組合健檢</title>
  <link rel="stylesheet" href="/static/commercial/styles/tokens.css?v=20260711-operator4">
  <link rel="stylesheet" href="/static/commercial/styles/shell.css?v=20260711-operator4">
  <link rel="stylesheet" href="/static/commercial/styles/components.css?v=20260711-operator4">
  <link rel="stylesheet" href="/static/commercial/styles/responsive.css?v=20260711-operator4">
</head>
<body data-commercial-page="portfolio">
  <header class="commercial-topbar">
    <a class="commercial-brand" href="/" aria-label="回到主頁">OnStock AI</a>
    <nav class="commercial-nav" aria-label="商業版投資工作區">
      <a href="/static/commercial/research-workbench.html">今日決策</a>
      <a href="/static/commercial/stock-detail.html">單股研究</a>
      <a href="/static/commercial/portfolio-dashboard.html" aria-current="page">組合健檢</a>
    </nav>
  </header>
  <main class="commercial-page">
    <header class="commercial-page-header">
      <span class="commercial-eyebrow">Portfolio Health</span>
      <h1 id="portfolio-title" tabindex="-1">組合健檢</h1>
      <p class="commercial-muted">把權重換成實際金額，先看現金、集中度與需要調整多少。</p>
    </header>
    <section id="portfolio-policy-editor" data-operator-policy-editor aria-label="操作設定"></section>
    <section id="portfolio-policy" class="commercial-policy-strip" aria-label="操作護欄" data-derived-from="operator-policy"></section>
    <div class="commercial-workspace-grid">
      <form id="portfolio-form" class="commercial-panel" novalidate>
      <label class="commercial-field" for="portfolio-csv">
        <span>持股 CSV</span>
        <textarea id="portfolio-csv" aria-describedby="portfolio-csv-help portfolio-csv-error">ticker,weight,sector,country
2330.TW,45,Semiconductor,TW
2308.TW,22,Power,TW
AAPL,14,Software,US
Cash,19,Cash,TW</textarea>
      </label>
      <p id="portfolio-csv-help" class="commercial-muted">必要欄位：ticker，以及 weight 或 market_value。</p>
      <p id="portfolio-csv-error" role="alert"></p>
      <button id="portfolio-run" class="commercial-primary-action" type="submit">分析目前組合</button>
      </form>
      <section class="commercial-answer" aria-labelledby="portfolio-answer-title">
        <span class="commercial-eyebrow">組合答案</span>
        <h2 id="portfolio-answer-title">貼上持股資料以開始健檢</h2>
        <p id="portfolio-answer-detail" class="commercial-muted"></p>
        <div id="portfolio-capital-metrics" class="commercial-metrics commercial-capital-metrics" data-derived-from="operator-policy"></div>
        <ol id="portfolio-recommendations" class="commercial-recommendations"></ol>
      </section>
    </div>
    <div id="portfolio-tabs" class="commercial-tabs" role="tablist" aria-label="組合研究證據">
      <button type="button" role="tab" aria-selected="true" data-tab="allocation">資金配置</button>
      <button type="button" role="tab" aria-selected="false" tabindex="-1" data-tab="exposure">曝險</button>
      <button type="button" role="tab" aria-selected="false" tabindex="-1" data-tab="thesis">論點</button>
      <button type="button" role="tab" aria-selected="false" tabindex="-1" data-tab="actions">調整清單</button>
    </div>
    <section id="portfolio-allocation-panel" class="commercial-panel" aria-labelledby="portfolio-allocation-title">
      <div class="commercial-section-heading">
        <div>
          <span class="commercial-eyebrow">操作資金配置明細</span>
          <h2 id="portfolio-allocation-title">每檔持股金額</h2>
        </div>
      </div>
      <div class="commercial-table-wrap">
        <table id="portfolio-position-table" class="commercial-data-table">
          <thead>
            <tr>
              <th scope="col">Ticker</th>
              <th scope="col">權重</th>
              <th scope="col">金額</th>
              <th scope="col">單股上限差額</th>
            </tr>
          </thead>
          <tbody id="portfolio-position-rows"></tbody>
        </table>
      </div>
    </section>
    <section id="portfolio-evidence" class="commercial-panel" aria-live="polite" hidden>完成健檢後顯示細節。</section>
    <section id="portfolio-source-status" class="commercial-source-status" aria-live="polite"></section>
  </main>
  <script type="module" src="/static/commercial/pages/portfolio_page.js?v=20260711-operator4"></script>
</body>
</html>
